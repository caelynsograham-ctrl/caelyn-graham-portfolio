
<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        body {
            background-color: #f2ede9;
            margin: 0;
            padding: 40px;
            font-family: sans-serif;
        }

        /* Sticky Rabbit */
        .rabbit-sticky {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 90px;
            z-index: 100;
            transition: transform 0.3s ease;
        }

        .rabbit-sticky:hover {
            transform: scale(1.1);
        }

        /* The Main Collage Grid */
        .collage-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Image Styling */
        .collage-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* Right Side Sub-Grid */
        .right-column {
            display: grid;
            grid-template-rows: auto auto auto;
            gap: 15px;
        }

        .top-right-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .bottom-right-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
    </style>
</head>

<body>

    <!-- Sticky Logo Button -->
    <div class="rabbit-sticky">
        <a href="nav.html">
            <img src="Graham_logo.png" alt="Logo" style="width:100%">
        </a>
    </div>

    <!-- Collage -->
    <div class="collage-container">
        
        <div class="left-column">
            <img src="large-image.jpg" alt="Person sitting in aisle">
        </div>

        <div class="right-column">
            
            <div class="top-right-grid">
                <img src="shelf-top.jpg" alt="Snack shelf">
                <img src="person-hat.jpg" alt="Person with hat">
            </div>

            <div class="middle-row">
                <img src="coke.jpg" alt="Coca Cola cans">
            </div>

            <div class="bottom-right-grid">
                <img src="girl-snack.jpg" alt="Girl with snacks">
                <img src="person-walking.jpg" alt="Person walking">
            </div>

        </div>

    </div>

</body>
</html>
