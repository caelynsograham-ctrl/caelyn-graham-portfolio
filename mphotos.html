
<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        body {
            background-color: #f2ede9;
            margin: 0;
            padding: 40px;
            font-family: sans-serif;
        }

        /* Sticky Rabbit */
        .rabbit-sticky {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 90px;
            z-index: 100;
            transition: transform 0.3s ease;
        }

        .rabbit-sticky:hover {
            transform: scale(1.1);
        }

        /* The Main Collage Grid */
        .collage-container {
          
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            width: 1300px;
            margin: 0 auto;
        }

        /* Image Styling */
        .collage-container img {
        
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* Right Side Sub-Grid */
        .right-column {
            display: grid;
            grid-template-rows: auto auto auto;
            gap: 15px;
        }

        .top-right-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .bottom-right-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
       .back-button {
        position: fixed;
        top: 45px;
        left: 1240px;
        z-index: 100;

        background-color: #D97388;
        color: #2B2B2B;

        font-family: 'Unbounded', sans-serif;
        font-weight: 900;
        font-size: 18px;

        padding: 12px 18px;
        text-decoration: none;

        border-radius: 6px;

        transition: transform 0.2s ease, opacity 0.2s ease;
      }

      .back-button:hover {
        transform: scale(1.08);
        background-color: white;
          
      }
    </style>
</head>

<body>

    <!-- Sticky Logo Button -->
    <div class="rabbit-sticky">
        <a href="nav.html">
            <img src="Graham_logo.png" alt="Logo" style="width:100%">
        </a>
    </div>
  <a href="magazine.html" class="back-button">Back to<br> Magazine</a>

    <!-- Collage -->
    <div class="collage-container">
        
        <div class="left-column">
            <img src="cool.png" alt="Person sitting in aisle">
        </div>

        <div class="right-column">
            
            <div class="top-right-grid">
                <img src="ramen.png" alt="Snack shelf">
                <img src="cap.png" alt="Person with hat">
            </div>

            <div class="middle-row">
                <img src="soda.png" alt="Coca Cola cans">
            </div>

            <div class="bottom-right-grid">
                <img src="snacks.png" alt="Girl with snacks">
                <img src="walk.png" alt="Person walking">
            </div>

        </div>

    </div>

</body>
</html>
