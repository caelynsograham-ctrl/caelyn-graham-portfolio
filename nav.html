<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Navigation</title>
    <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@900&display=swap" rel="stylesheet">
    <style>
    /* --- GLASS NAV STYLES --- */
    .glass-nav {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100vh;
      background: rgba(244, 238, 233, 0.7); 
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      z-index: 20;
      display: flex;
      justify-content: center;
      align-items: center; 
      text-align: center;
    }

    .nav-container {
      display: flex;
      flex-direction: column;
      align-items: center; 
      gap: 50px;
    }

    /* Logo link to home */
    .nav-logo {
      width: 120px;
      cursor: pointer;
      transition: transform 0.3s ease;
    }

    .nav-logo:hover {
      transform: scale(1.1);
    }

    .nav-logo img {
      width: 100%;
      height: auto;
    }

    .nav-links {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 30px;
    }

    .nav-links li a {
      display: inline-block;
      background-color: #2B2B2B;
      color: #FFFFFF;
      text-decoration: none;
      font-family: 'Unbounded', sans-serif;
      font-weight: 900;
      font-size: 2.5rem;
      padding: 10px 40px;
      text-transform: uppercase;
      transition: all 0.2s ease;
    }

    .nav-links li a:hover {
      background-color: #D97388; /* Pink accent */
      color: #2B2B2B;
      transform: scale(1.05);
    }
    </style>
</head>
<body>

<nav class="glass-nav">
  <div class="nav-container">
    <a href="index.html" class="nav-logo">
      <img src="Graham_logo.png" alt="Logo">
    </a>
    
    <ul class="nav-links">
      <li><a href="index.html#about-section">About Me</a></li>
      <li><a href="index.html#carousel-section">Work</a></li>
      <li><a href="index.html#contact">Contact</a></li>
    </ul>
  </div>
</nav>

</body>
</html>
