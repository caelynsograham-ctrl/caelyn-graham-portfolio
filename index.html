<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Caelyn Graham Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@900&display=swap" rel="stylesheet">

<style>
:root {
    --bg-color: #f2ede9; 
    --pink-accent: #d17d88;
    --grey-box: #e0e0e0;
    --dark-grey: #4d4d4d;
    --button-black: #2a2a2a;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
    background-color: var(--bg-color);
    scroll-snap-type: y mandatory;
    overflow-y: scroll;
    height: 100vh;
    font-family: 'Unbounded', sans-serif;
    color: var(--dark-grey);
}

/* LOGO */
.rabbit-fixed {
    position: fixed;
    z-index: 50;
    pointer-events: none;
    opacity: 0.6;
    will-change: transform, width, top, right;
}
.rabbit-fixed img {
    width: 100%;
    height: auto;
}

/* BUTTON */
.sticky-btn {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    width: 140px;
    height: 35px;
    background-color: var(--button-black);
    z-index: 100;
    border: none;
    cursor: pointer;
}

/* SECTIONS */
section {
    height: 100vh;
    width: 100vw;
    scroll-snap-align: start;
    position: relative;
    display: flex;
    flex-direction: column;
    justify-content: center;
    overflow: hidden;
}

/* HERO */
#hero-section { padding: 0 5vw; }
.hero-text {
    font-size: 13.5vw;
    line-height: 0.85;
    letter-spacing: -0.05em;
    text-transform: uppercase;
}

/* ABOUT */
#about-section {
    padding: 0 5vw;
    display: flex;
    align-items: center;
    justify-content: center;
}
.about-container {
    position: relative;
    width: 100%;
    max-width: 1200px;
    height: 552px;
}
.pink-square {
    width: 459px;
    height: 552px;
    background-color: var(--pink-accent);
    position: absolute;
    left: 0;
    top: 0;
}
.about-content {
    position: absolute;
    top: 0;
    left: 459px;
    display: flex;
    flex-direction: column;
}
.about-content h2 {
    font-size: 11vw;
    line-height: 0.8;
    margin-bottom: 30px;
    margin-left: -15vw;
    white-space: nowrap;
}
.grey-placeholder {
    width: 350px;
    height: 180px;
    background-color: var(--grey-box);
    margin-left: 20px;
}

/* CAROUSEL */
#carousel-section { align-items: center; }

.carousel-frame {
    background-color: var(--pink-accent);
    width: 85%;
    height: 500px;
    display: flex;
    align-items: center;
    overflow: hidden;
}

.carousel-track {
    display: flex;
    gap: 40px;
    padding: 0 40px;
    transition: transform 0.4s ease;
}

.carousel-item {
    min-width: 300px;
    height: 100%;
    background-color: #ffffff;
}

.carousel-item.inactive {
    background-color: var(--grey-box);
}

.nav-buttons {
    display: flex;
    gap: 30px;
    margin-top: 40px;
}
.nav-btn {
    width: 120px;
    height: 35px;
    background-color: var(--button-black);
    border: none;
    cursor: pointer;
}
</style>
</head>

<body>

<!-- LOGO -->
<div id="main-rabbit" class="rabbit-fixed">
    <img src="Graham_logo.png" alt="Logo">
</div>

<button class="sticky-btn"></button>

<!-- HERO -->
<section id="hero-section">
    <h1 class="hero-text">CAELYN<br>GRAHAM</h1>
</section>

<!-- ABOUT -->
<section id="about-section">
    <div class="about-container">
        <div class="pink-square"></div>
        <div class="about-content">
            <h2>About Me</h2>
            <div class="grey-placeholder"></div>
        </div>
    </div>
</section>

<!-- CAROUSEL -->
<section id="carousel-section">
    <div class="carousel-frame">
        <div class="carousel-track" id="track">
            <div class="carousel-item"></div>
            <div class="carousel-item"></div>
            <div class="carousel-item"></div>
            <div class="carousel-item inactive"></div>
        </div>
    </div>

    <div class="nav-buttons">
        <button class="nav-btn" onclick="moveCarousel(-1)"></button>
        <button class="nav-btn" onclick="moveCarousel(1)"></button>
    </div>
</section>

<script>
const rabbit = document.getElementById('main-rabbit');

/* SCROLL ANIMATION */
window.addEventListener('scroll', () => {
    const scrollY = window.scrollY;
    const windowHeight = window.innerHeight;
    let progress = Math.min(scrollY / windowHeight, 1);

    const startWidth = window.innerWidth * 0.38;
    const endWidth = 60;

    const currentWidth = startWidth - (progress * (startWidth - endWidth));
    const currentTop = (windowHeight * 0.05) - (progress * ((windowHeight * 0.05) - 20));
    const currentRight = (window.innerWidth * 0.08) - (progress * ((window.innerWidth * 0.08) - 20));

    rabbit.style.width = currentWidth + "px";
    rabbit.style.top = currentTop + "px";
    rabbit.style.right = currentRight + "px";
});

/* INFINITE CAROUSEL */
const track = document.getElementById('track');
let items = Array.from(track.children);

const itemWidth = 300;
const gap = 40;

/* clone for seamless loop */
items.forEach(item => {
    track.appendChild(item.cloneNode(true));
});

let position = 0;

function moveCarousel(direction) {
    position += direction * (itemWidth + gap);
    track.style.transform = `translateX(${-position}px)`;

    const max = (itemWidth + gap) * items.length;

    if (position >= max) {
        reset(0);
    }
    if (position < 0) {
        reset(max - (itemWidth + gap));
    }

    updateStyles();
}

function reset(newPos) {
    track.style.transition = "none";
    position = newPos;
    track.style.transform = `translateX(${-position}px)`;
    requestAnimationFrame(() => {
        track.style.transition = "transform 0.4s ease";
    });
}

/* keep 4th item grey */
function updateStyles() {
    const index = Math.round(position / (itemWidth + gap));

    Array.from(track.children).forEach((item, i) => {
        item.classList.toggle('inactive', i === index + 3);
    });
}

updateStyles();
</script>

</body>
</html>
