<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caelyn Graham Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@900&display=swap" rel="stylesheet">
    <style>
      :root {
        --bg-color: #F4EEE9;
        --pink-accent: #D97388;
        --grey-box: #e0e0e0;
        --dark-grey: #4d4d4d;
        --button-black: #2B2B2B;
      }

      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        background-color: var(--bg-color);
        scroll-snap-type: y mandatory;
        overflow-y: scroll;
        height: 100vh;
        font-family: 'Unbounded', sans-serif;
        color: var(--dark-grey);
        overflow-x: hidden;
      }

      /* --- LOGO (Preserved Layout, Added Clickability) --- */
      .rabbit-fixed {
        position: fixed;
        z-index: 11; /* High z-index to ensure it is clickable over text */
        opacity: 0.4;
        will-change: transform, width, top, right;
        transition: opacity 0.3s ease;
        display: block; /* Required for the anchor tag to hold the image shape */
        cursor: pointer;
      }

      .rabbit-fixed img {
        width: 100%;
        height: auto;
        display: block;
      }

      .sticky-btn {
        position: fixed;
        bottom: 30px;
        left: 50%;
        transform: translateX(-50%);
        width: 140px;
        height: 35px;
        background-color: var(--button-black);
        z-index: 100;
        border: none;
      }

      section {
        height: 100vh;
        width: 100vw;
        scroll-snap-align: start;
        position: relative;
        display: flex;
        flex-direction: column;
        justify-content: center;
        overflow: hidden;
      }

      #hero-section {
        padding-left: 0.4vw;
        padding-right: 5vw;
        position: relative;
        display: flex;
        flex-direction: column;
      }

      .hero-text {
        font-weight: 900;
        line-height: 1.1;
        letter-spacing: -0.05em;
        text-transform: uppercase;
        position: relative;
        z-index: 10;
      }

      .caelyn-name {
        font-size: 170.5px; 
        letter-spacing: -0.05em;
        display: block;
        transform: scale(.85, 2) translateY(1vw); 
        transform-origin: left center; 
        margin-left: 2vw; 
      }

      .graham-name {
        font-size: 170.5px;
        letter-spacing: -0.05em;
        text-align: right;
        position: absolute;
        left: 2vw; 
        z-index: 12;
        transform: scale(1.2, 1.8) translateY(12vw); 
        transform-origin: left center; 
      }

      /* --- ABOUT & CAROUSEL --- */
      #about-section {
        padding: 0 5vw;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .about-container { position: relative; width: 100%; max-width: 1200px; height: 552px; }
      .pink-square { width: 459px; height: 552px; background-color: var(--pink-accent); position: absolute; left: 0; top: 0; z-index: 1; }
      .about-content { position: absolute; top: 0; left: 459px; display: flex; flex-direction: column; z-index: 10; }
      .about-content h2 { font-size: 11vw; line-height: 0.8; margin-bottom: 30px; margin-left: -22vw; white-space: nowrap; }
      .grey-placeholder { width: 350px; height: 180px; background-color: var(--grey-box); margin-left: -5vw; }
      #carousel-section { align-items: center; }
      .carousel-frame { background-color: var(--pink-accent); width: 85%; height: 600px; display: flex; align-items: center; overflow: hidden; position: relative; border-radius: 5%; }
      .carousel-track { display: flex; gap: 40px; }
      .carousel-item { min-width: 300px; height: 380px; background-color: #ffffff; }
      .carousel-item.inactive { background-color: var(--grey-box); }
      .nav-buttons { display: flex; gap: 30px; margin-top: 40px; }
      .nav-btn { width: 120px; height: 35px; background-color: var(--button-black); border: none; cursor: pointer; }
    </style>
</head>
<body>

    <a href="nav.html" id="main-rabbit" class="rabbit-fixed">
      <img src="Graham_logo.png" alt="Logo">
    </a>

    <button class="sticky-btn"></button>

    <section id="hero-section">
      <h1 class="hero-text caelyn-name">CAELYN</h1>
      <h1 class="hero-text graham-name">GRAHAM</h1>
    </section>

    <section id="about-section">
      <div class="about-container">
        <div class="pink-square"></div>
        <div class="about-content">
          <h2>About Me</h2>
          <div class="grey-placeholder"></div>
        </div>
      </div>
    </section>

    <section id="carousel-section">
      <div class="carousel-frame">
        <div class="carousel-track" id="track">
          <div class="carousel-item"></div>
          <div class="carousel-item"></div>
          <div class="carousel-item"></div>
          <div class="carousel-item inactive"></div>
        </div>
      </div>
      <div class="nav-buttons">
        <button class="nav-btn" onclick="moveCarousel(-1)"></button>
        <button class="nav-btn" onclick="moveCarousel(1)"></button>
      </div>
    </section>

    <script>
      const rabbit = document.getElementById('main-rabbit');

      function updateRabbit () {
        const scrollY = window.scrollY;
        const windowHeight = window.innerHeight;
        const windowWidth = window.innerWidth;
        let progress = Math.min(scrollY / windowHeight, 1);

        const startWidth = windowWidth * 0.50;
        const endWidth = 80;
        const startRight = windowWidth * 0.0;
        const endRight = 20;
        const startTop = windowHeight * 0.0;
        const endTop = 20;

        const currentWidth = startWidth - (progress * (startWidth - endWidth));
        const currentTop = startTop - (progress * (startTop - endTop));
        const currentRight = startRight - (progress * (startRight - endRight));

        rabbit.style.width = currentWidth + "px";
        rabbit.style.top = currentTop + "px";
        rabbit.style.right = currentRight + "px";
        // Increased opacity slightly to show it's a clickable button
        rabbit.style.opacity = 0.6 + (progress * 0.4); 
      }

      window.addEventListener('load', updateRabbit);
      window.addEventListener('scroll', updateRabbit);
      window.addEventListener('resize', updateRabbit);

      /* CAROUSEL LOGIC */
      const track = document.getElementById('track');
      let items = Array.from(track.children);
      const itemWidth = 300;
      const gap = 40;
      items.forEach(item => track.appendChild(item.cloneNode(true)));
      let position = 0;
      function moveCarousel (direction) {
        position += direction * (itemWidth + gap);
        track.style.transition = "transform 0.4s cubic-bezier(0.25, 1, 0.5, 1)";
        track.style.transform = `translateX(${-position}px)`;
        const max = (itemWidth + gap) * items.length;
        if (position >= max) setTimeout(() => reset(0), 400);
        if (position < 0) setTimeout(() => reset(max - (itemWidth + gap)), 400);
      }
      function reset (newPos) {
        track.style.transition = "none";
        position = newPos;
        track.style.transform = `translateX(${-position}px)`;
      }
    </script>
</body>
</html>
